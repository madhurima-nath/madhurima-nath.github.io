<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1000" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c8c8c8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="1000" fill="#1e1e1e"/>

  <!-- Source systems -->
  <rect x="20" y="40" width="200" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="120" y="81" text-anchor="middle" font-size="17" fill="#ffffff">🗄️ SQL Server</text>

  <rect x="250" y="40" width="200" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="350" y="81" text-anchor="middle" font-size="17" fill="#ffffff">☁️ Salesforce</text>

  <rect x="480" y="40" width="200" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="580" y="81" text-anchor="middle" font-size="17" fill="#ffffff">🟧 Redshift</text>

  <rect x="710" y="40" width="200" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="810" y="81" text-anchor="middle" font-size="17" fill="#ffffff">🔷 BigQuery</text>

  <!-- AI-automated conversion tool -->
  <rect x="305" y="190" width="320" height="80" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="465" y="222" text-anchor="middle" font-size="18" fill="#ffffff">⚙️ AI-automated</text>
  <text x="465" y="248" text-anchor="middle" font-size="18" fill="#ffffff">conversion tool</text>

  <!-- Unity Catalog boundary -->
  <rect x="270" y="320" width="390" height="525" rx="16" fill="#333333" stroke="#5b7c99" stroke-width="1.5"/>
  <line x1="280" y1="372" x2="650" y2="372" stroke="#5b7c99" stroke-width="1" opacity="0.6"/>
  <text x="465" y="351" text-anchor="middle" font-size="19" font-weight="bold" fill="#f0d878">🔐 Unity Catalog</text>

  <!-- Databricks Asset Bundle repos -->
  <rect x="305" y="380" width="320" height="80" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="465" y="410" text-anchor="middle" font-size="17" fill="#ffffff">📦 Databricks Asset Bundle</text>
  <text x="465" y="436" text-anchor="middle" font-size="17" fill="#ffffff">repos (GCP)</text>

  <!-- Lakehouse boundary (nested inside Unity Catalog) -->
  <rect x="290" y="500" width="350" height="325" rx="14" fill="#2a2f22" stroke="#c9a227" stroke-width="1.5"/>
  <text x="465" y="529" text-anchor="middle" font-size="17" font-weight="bold" fill="#c9a227">🏠 Lakehouse (medallion architecture)</text>

  <rect x="305" y="555" width="320" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="465" y="596" text-anchor="middle" font-size="17" fill="#ffffff">🥉 Bronze &#8211; 94 patient + 68 supply chain objects</text>

  <rect x="305" y="645" width="320" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="465" y="686" text-anchor="middle" font-size="17" fill="#ffffff">🥈 Silver &#8211; cleaned &amp; conformed</text>

  <rect x="305" y="735" width="320" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="465" y="776" text-anchor="middle" font-size="17" fill="#ffffff">🥇 Gold &#8211; aggregated</text>

  <!-- Outcome -->
  <rect x="305" y="880" width="320" height="80" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="465" y="910" text-anchor="middle" font-size="17" fill="#ffffff">⏱️ Latency</text>
  <text x="465" y="936" text-anchor="middle" font-size="17" fill="#ffffff">8&#8211;10 hrs &#8594; near real-time</text>

  <!-- Arrows: sources into tool -->
  <line x1="120" y1="110" x2="350" y2="190" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="110" x2="410" y2="190" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="110" x2="520" y2="190" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="810" y1="110" x2="580" y2="190" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrows: main trunk -->
  <line x1="465" y1="270" x2="465" y2="380" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="465" y1="460" x2="465" y2="500" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="465" y1="625" x2="465" y2="645" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="465" y1="715" x2="465" y2="735" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="465" y1="805" x2="465" y2="880" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
