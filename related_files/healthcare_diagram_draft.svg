<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 970" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c8c8c8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="970" fill="#1e1e1e"/>

  <!-- Legacy systems (examples, not exhaustive) -->
  <rect x="165" y="40" width="600" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="465" y="81" text-anchor="middle" font-size="17" fill="#ffffff">🗄️ Legacy systems: SQL Server, Salesforce, Redshift, BigQuery</text>

  <!-- AI-automated conversion tool -->
  <rect x="165" y="190" width="600" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="465" y="231" text-anchor="middle" font-size="19" fill="#ffffff">⚙️ AI-automated conversion tool</text>

  <!-- Unity Catalog boundary -->
  <rect x="130" y="320" width="670" height="505" rx="16" fill="#333333" stroke="#5b7c99" stroke-width="1.5"/>
  <line x1="140" y1="372" x2="790" y2="372" stroke="#5b7c99" stroke-width="1" opacity="0.6"/>
  <text x="465" y="351" text-anchor="middle" font-size="19" font-weight="bold" fill="#f0d878">🔐 Unity Catalog</text>

  <!-- Databricks Asset Bundle repos -->
  <rect x="165" y="380" width="600" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="465" y="421" text-anchor="middle" font-size="19" fill="#ffffff">📦 Databricks Asset Bundle repos (GCP)</text>

  <!-- Lakehouse boundary (nested inside Unity Catalog) -->
  <rect x="150" y="500" width="630" height="305" rx="14" fill="#2a2f22" stroke="#c9a227" stroke-width="1.5"/>
  <text x="465" y="529" text-anchor="middle" font-size="17" font-weight="bold" fill="#c9a227">🏠 Lakehouse (medallion architecture)</text>

  <rect x="165" y="555" width="600" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="465" y="596" text-anchor="middle" font-size="18" fill="#ffffff">🥉 Bronze &#8211; 94 patient + 68 supply chain objects</text>

  <rect x="165" y="635" width="600" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="465" y="676" text-anchor="middle" font-size="18" fill="#ffffff">🥈 Silver &#8211; cleaned &amp; conformed</text>

  <rect x="165" y="715" width="600" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="465" y="756" text-anchor="middle" font-size="18" fill="#ffffff">🥇 Gold &#8211; aggregated</text>

  <!-- Outcome -->
  <rect x="165" y="865" width="600" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="465" y="906" text-anchor="middle" font-size="19" fill="#ffffff">⏱️ Latency: 8&#8211;10 hrs &#8594; near real-time</text>

  <!-- Arrows: single straight column, no crossings -->
  <line x1="465" y1="110" x2="465" y2="190" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="465" y1="260" x2="465" y2="380" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="465" y1="450" x2="465" y2="500" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="465" y1="625" x2="465" y2="635" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="465" y1="705" x2="465" y2="715" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="465" y1="785" x2="465" y2="865" stroke="#c8c8c8" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
