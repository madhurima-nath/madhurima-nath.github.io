<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c8c8c8"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f0d878"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="880" fill="#1e1e1e"/>

  <!-- Outer Unity Catalog boundary (encloses the whole pipeline, including MLflow's registry) -->
  <rect x="20" y="20" width="1140" height="800" rx="16" fill="#333333" stroke="#5b7c99" stroke-width="1.5"/>
  <line x1="30" y1="72" x2="1150" y2="72" stroke="#5b7c99" stroke-width="1" opacity="0.6"/>
  <text x="590" y="52" text-anchor="middle" font-size="22" font-weight="bold" fill="#f0d878">🔐 Unity Catalog: governs data, models &amp; access, end to end</text>

  <!-- Product docs -->
  <rect x="290" y="100" width="280" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="430" y="141" text-anchor="middle" font-size="18" fill="#ffffff">📄 Product docs</text>

  <!-- Embed -->
  <rect x="290" y="210" width="280" height="80" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="430" y="240" text-anchor="middle" font-size="18" fill="#ffffff">🧠 Embed</text>
  <text x="430" y="266" text-anchor="middle" font-size="16" fill="#ffffff">Foundation Model API</text>

  <!-- Query -->
  <rect x="55" y="345" width="200" height="60" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="155" y="380" text-anchor="middle" font-size="18" fill="#ffffff">🙋 Query</text>

  <!-- Vector Search index -->
  <rect x="600" y="335" width="210" height="80" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="705" y="368" text-anchor="middle" font-size="15" fill="#ffffff">🗄️ Vector Search</text>
  <text x="705" y="392" text-anchor="middle" font-size="15" fill="#ffffff">index</text>

  <!-- Agent -->
  <rect x="290" y="460" width="280" height="70" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="430" y="501" text-anchor="middle" font-size="18" fill="#ffffff">🤖 Agent</text>

  <!-- Llama drafts the answer -->
  <rect x="290" y="570" width="280" height="80" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="430" y="602" text-anchor="middle" font-size="18" fill="#ffffff">💬 Llama drafts</text>
  <text x="430" y="628" text-anchor="middle" font-size="18" fill="#ffffff">the answer</text>

  <!-- Product match + context -->
  <rect x="290" y="690" width="280" height="80" rx="8" fill="#111318" stroke="#6f9bbf" stroke-width="1.5"/>
  <text x="430" y="722" text-anchor="middle" font-size="18" fill="#ffffff">✅ Product match +</text>
  <text x="430" y="748" text-anchor="middle" font-size="18" fill="#ffffff">context</text>

  <!-- MLflow (registry lives inside Unity Catalog too, hence gold border on the shared UC background rather than a separate box outside) -->
  <rect x="880" y="380" width="260" height="100" rx="8" fill="#111318" stroke="#f0d878" stroke-width="1.5"/>
  <text x="1010" y="410" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">📊 MLflow</text>
  <text x="1010" y="434" text-anchor="middle" font-size="15" fill="#ffffff">tracks experiments &amp;</text>
  <text x="1010" y="456" text-anchor="middle" font-size="15" fill="#ffffff">versions throughout</text>

  <!-- Dashed grouping box: steps MLflow actually tracks -->
  <rect x="270" y="195" width="320" height="470" rx="16" fill="none" stroke="#f0d878" stroke-width="2" stroke-dasharray="10,7"/>

  <!-- Arrows: main trunk -->
  <path d="M430,170 L430,210" stroke="#c8c8c8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M430,530 L430,570" stroke="#c8c8c8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M430,650 L430,690" stroke="#c8c8c8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrows: side routing, plain 90-degree bends -->
  <!-- Embed (right side) -> across -> down into top of Vector Search -->
  <path d="M570,250 L705,250 L705,335" stroke="#c8c8c8" stroke-width="2" fill="none" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <!-- Vector Search (bottom) -> down -> across into right side of Agent -->
  <path d="M705,415 L705,495 L570,495" stroke="#c8c8c8" stroke-width="2" fill="none" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <!-- Query (lower end) -> down -> across into left side of Agent -->
  <path d="M155,405 L155,495 L290,495" stroke="#c8c8c8" stroke-width="2" fill="none" stroke-linejoin="round" marker-end="url(#arrow)"/>

  <!-- Arrow: MLflow grouping -->
  <path d="M590,430 L875,430" stroke="#f0d878" stroke-width="2" stroke-dasharray="6,5" fill="none" marker-end="url(#arrowGold)"/>
</svg>
